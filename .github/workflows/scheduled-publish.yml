name: Publish scheduled blog posts

on:
  schedule:
    - cron: '0 20 * * *'  # 7:00 AM AEST (UTC+11) daily
  workflow_dispatch: {}    # Allow manual trigger

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Regenerate blog index and sitemap
        run: python scripts/publish.py

      - name: Commit and push if changed
        run: |
          git diff --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog/index.html sitemap.xml
          git commit -m "Publish scheduled blog posts"
          git push
